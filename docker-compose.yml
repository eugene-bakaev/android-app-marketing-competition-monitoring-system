services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_monitor
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: api
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app_monitor
      REDIS_URL: redis://redis:6379
      API_PORT: '3001'
    volumes:
      - screenshots:/app/local-screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3001/api/apps || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app_monitor
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: '2'
    volumes:
      - screenshots:/app/local-screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: ''
    ports:
      - '8080:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  screenshots:
